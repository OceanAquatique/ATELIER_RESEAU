# DHCP-only configuration (DNS disabled with port=0)
port=0

# Bind to the LAN interface only
interface=eth0
bind-interfaces

# DHCP pool (excludes static IPs 172.20.1.2 and .254)
dhcp-range=172.20.1.100,172.20.1.200,12h

# Standard options handed out to clients
dhcp-option=option:router,172.20.1.254
dhcp-option=option:dns-server,1.1.1.1,8.8.8.8
dhcp-option=option:domain-name,lab.local

# Authoritative server (faster NAK on stale leases)
dhcp-authoritative
