# Custom log format: makes the source IP perceived by the "Internet" obvious
log_format lab '[$time_local] FROM=$remote_addr -> "$request" status=$status ua="$http_user_agent"';
access_log /var/log/nginx/access.log lab;

server {
    listen 80 default_server;
    server_name _;

    # Returns the perceived source IP (i.e. the NAT'd public IP)
    location /whoami {
        default_type text/plain;
        return 200 "Your perceived source IP (post-NAT) is: $remote_addr\n";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
